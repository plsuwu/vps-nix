# server:
#   http_listen_port: 3200
#   grpc_listen_port: 9095

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4320
        http:
          endpoint: 0.0.0.0:4321

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 336h

storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/blocks
    wal:
      path: /tmp/tempo/wal

    # backend: gcs
    # gcs:
    #   bucket_name: idealism_agonize_reacquire
    #   prefix: tempo_traces

query_frontend:
  search:
    duration_slo: 5s
    throughput_bytes_slo: 1.073741824e+09
  trace_by_id:
    duration_slo: 5s

metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /tmp/tempo/generator/wal
    remote_write: 
      - url: http://localhost:9090/api/v1/write
  processor:
    span_metrics:
      dimensions:
        - service.name
        - span.name
        - span.kind
        - status.code
